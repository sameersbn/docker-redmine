services:
  postgresql:
    image: sameersbn/postgresql:14-20230628
    environment:
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASS=${DB_PASS:?DB_PASS is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
    volumes:
      - ${POSTGRES_DATA_DIR:?POSTGRES_DATA_DIR is required}:/var/lib/postgresql
    healthcheck:
      test: "psql -U postgres"
      interval: 3s
      timeout: 3s
      retries: 5
      start_period: 10s

  redmine:
    build:
      context: ./
      args:
        REDMINE_VERSION: ${REDMINE_VERSION:?REDMINE_VERSION is required}
        REDMINE_FLAVOR: ${REDMINE_FLAVOR:?REDMINE_FLAVOR is required}
    image: ${IMAGE:?IMAGE is required}
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - TZ=${TZ:?TZ is required}

      - DB_ADAPTER=postgresql
      - DB_HOST=${DB_HOST:?DB_HOST is required}
      - DB_PORT=${DB_PORT:?DB_PORT is required}
      - DB_USER=${DB_USER:?DB_USER is required}
      - DB_PASS=${DB_PASS:?DB_PASS is required}
      - DB_NAME=${DB_NAME:?DB_NAME is required}
      - DB_SSL_MODE=prefer

      - REDMINE_PORT=${APP_PORT:?APP_PORT is required}
      - REDMINE_HTTPS=false
      - REDMINE_RELATIVE_URL_ROOT=
      - REDMINE_SECRET_TOKEN=

      - REDMINE_SUDO_MODE_ENABLED=false
      - REDMINE_SUDO_MODE_TIMEOUT=15

      - REDMINE_CONCURRENT_UPLOADS=2

      - REDMINE_BACKUP_SCHEDULE=
      - REDMINE_BACKUP_EXPIRY=
      - REDMINE_BACKUP_TIME=

      - NGINX_MAX_UPLOAD_SIZE=20m

      - SMTP_ENABLED=false
      - SMTP_METHOD=smtp
      - SMTP_DOMAIN=www.example.com
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=mailer@example.com
      - SMTP_PASS=password
      - SMTP_STARTTLS=true
      - SMTP_AUTHENTICATION=:login

      - IMAP_ENABLED=false
      - IMAP_HOST=imap.gmail.com
      - IMAP_PORT=993
      - IMAP_USER=mailer@example.com
      - IMAP_PASS=password
      - IMAP_SSL=true
      - IMAP_INTERVAL=30

    healthcheck:
      test: curl -f http://localhost/up || exit 1
      interval: 10s
      timeout: 10s
      retries: 3

    ports:
      - "${APP_PORT:?APP_PORT is required}:80"
    volumes:
      - ${DATA_DIR:?DATA_DIR is required}:/home/redmine/data
      - ${LOG_DIR:?LOG_DIR is required}:/var/log/redmine